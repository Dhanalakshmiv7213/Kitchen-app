apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: kitchen-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kitchen-api
  template:
    metadata:
      labels:
        app: kitchen-api
    spec:
      containers:
        - name: kitchen-api
          image: kitchen-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_URI
              value: mongodb://mongo:27017/kitchen
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: kitchen-app
spec:
  type: NodePort
  selector:
    app: kitchen-api
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30007