apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: kitchen-app
spec:
  serviceName: mongo
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7.0
          ports:
            - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: kitchen-app
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017